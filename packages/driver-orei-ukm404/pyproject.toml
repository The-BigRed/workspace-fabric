[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "workspace-fabric-driver-orei-ukm404"
version = "1.0.0"
description = "Workspace Fabric OREI UKM-404 Driver - USB matrix control"
readme = "README.md"
requires-python = ">=3.14"
license = "Apache-2.0"
authors = [{ name = "Brad Richins" }]
dependencies = [
    "workspace-fabric-driver-api>=1.0.0",
    "pyserial>=3.5",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.1.1",
]

[project.entry-points."workspace_fabric.drivers"]
orei_ukm404 = "workspace_fabric_driver_orei_ukm404.plugin:get_plugin_descriptor"

[tool.black]
line-length = 100
target-version = ["py314"]

[tool.pytest.ini_options]
pythonpath = ["src", "../driver-api/src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py314"
src = ["src", "tests"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["workspace_fabric_driver_orei_ukm404*"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
