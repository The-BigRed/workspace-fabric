[build-system]
requires = ["setuptools>=80"]
build-backend = "setuptools.build_meta"

[project]
name = "workspace-fabric-driver-orei-uhd808"
version = "1.0.0"
description = "Workspace Fabric OREI UHD-808 Driver - HDMI matrix control"
readme = "README.md"
requires-python = ">=3.14"
license = "Apache-2.0"
authors = [{ name = "Brad Richins" }]
dependencies = [
    "workspace-fabric-driver-api>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.1.1",
]

[tool.black]
line-length = 100
target-version = ["py314"]

[tool.pytest.ini_options]
pythonpath = ["src", "../driver-api/src", "../core/src"]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py314"
src = ["src", "tests"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["workspace_fabric_driver_orei_uhd808*"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
